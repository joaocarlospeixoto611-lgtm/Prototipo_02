<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 05</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Trabalhando com Áudio e Vídeo</h1>
    <h2>Áudio Simples</h2>
    <audio src="Asterisk - ORANGE RANGE (128k).mp3" controls></audio>
    <h2>Nova forma de adicionar áudio</h2>
    <audio controls autoplay loop> 
        <audio preload="none" controls loop></audio> 
    <source src="Asterisk - ORANGE RANGE (128k).mp3" type="audio/mpeg">
    </audio>
    <h2>Vídeo Simples</h2>
    <video src="ORANGE RANGE『～アスタリスク～』MV - ORANGE RANGE (1080p).mp4" controls width="640" height="360" autoplay loop></video>
</body>
</html>
